# ============================================================
# Aura Terminal — Quant Trading System | Docker Compose
# Aura Investments I+D · 2026
# ============================================================

services:
  # ── Python App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-app
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://aura-redis:6379
    ports:
      - "8000:8000"       # FastAPI / metrics
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aura-net

  # ── Redis (Event Bus + Cache) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aura-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aura-net

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aura-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aura-net

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aura-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-aura2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - aura-net

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  aura-net:
    driver: bridge
