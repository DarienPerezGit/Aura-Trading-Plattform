# ============================================================
# FENIX — Quant Trading System | Docker Compose
# ============================================================

services:
  # ── Python App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"       # FastAPI / metrics
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fenix-net

  # ── Redis (Event Bus + Cache) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fenix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fenix-net

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fenix-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fenix-net

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fenix-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-fenix2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - fenix-net

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  fenix-net:
    driver: bridge
