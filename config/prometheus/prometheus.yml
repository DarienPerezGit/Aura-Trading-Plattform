# ============================================================
# Prometheus — Aura Terminal scrape config
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "aura-terminal"
    metrics_path: /metrics
    static_configs:
      - targets: ["aura-app:8000"]
        labels:
          service: "aura-api"
          environment: "hackathon"
